<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Optician - Savings Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>The Optician Savings Tracker</h1>
        <p>Target: 5,000,000 UGX</p>
    </header>

    <main>
        <section class="input-card">
            <h3>Add New Payment</h3>
            <input type="text" id="userName" placeholder="Name (e.g. Nathan)">
            <input type="number" id="userAmount" placeholder="Amount (UGX)">
            <button onclick="addPayment()">Save Payment</button>
        </section>

        <section class="progress-container">
            <h3>Total Monthly Savings</h3>
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar-fill"></div>
            </div>
            <p id="totalDisplay">0 UGX / 5,000,000 UGX</p>
        </section>

        <section class="history-card">
            <h3>Recent Payments (Current Month)</h3>
            <table id="paymentsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Amount (UGX)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
