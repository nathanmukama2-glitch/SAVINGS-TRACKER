<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Optician Savings Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2, h3 { color: #1a73e8; text-align: center; margin-top: 0; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #218838; }
        .summary-box { background: #e8f0fe; padding: 15px; border-radius: 10px; text-align: center; margin: 20px 0; border: 1px solid #d2e3fc; }
        .progress-container { margin-bottom: 15px; }
        .progress-bar { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { background: #28a745; height: 100%; width: 0%; transition: width 0.5s; }
        #status { text-align: center; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>The Optician</h2>
    <h3>Savings Tracker</h3>
    
    <form id="savingsForm">
        <select name="member" required>
            <option value="">Select Member</option>
            <option value="Nathan">Nathan</option>
            <option value="Brian">Brian</option>
            <option value="Jackson">Jackson</option>
        </select>
        
        <select name="type" required>
            <option value="Savings">Savings</option>
            <option value="Borrowed">Borrowed</option>
            <option value="Expense">Expense</option>
        </select>

        <input type="number" name="amount" placeholder="Amount (UGX)" required>
        <input type="month" name="month" required id="monthPicker">
        
        <button type="submit" id="submitBtn">Save to Sheet</button>
    </form>

    <div id="status">Syncing with Google...</div>

    <div class="summary-box">
        <strong>Cash at Hand</strong><br>
        <span id="cashAtHand" style="font-size: 24px; color: #28a745;">0</span> <small>UGX</small>
    </div>

    <h4>Monthly Progress (50k Target)</h4>
    <div id="progressSection"></div>
</div>

<script>
    // --- REPLACE THIS URL WITH YOUR NEW DEPLOYMENT URL ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwTf5F09wJSfKibcwk0iUSXmczyZ-gbre9llaDAmeGUwozf8q2p5iAK0o0NezedD_fH1A/exec';
    
    const form = document.getElementById('savingsForm');
    const statusDiv = document.getElementById('status');
    const monthInput = document.getElementById('monthPicker');

    // Set default month to current
    const now = new Date();
    monthInput.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

    // Load data when page opens
    window.onload = fetchData;

    function fetchData() {
        statusDiv.innerText = "Fetching latest totals...";
        fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                calculateAndDisplay(data);
                statusDiv.innerText = "Last updated: " + new Date().toLocaleTimeString();
            })
            .catch(err => {
                statusDiv.innerText = "Offline Mode (Check Connection)";
                console.error(err);
            });
    }

    function calculateAndDisplay(data) {
        let totalCash = 0;
        let members = { Nathan: 0, Brian: 0, Jackson: 0 };

        data.forEach(item => {
            let amt = parseFloat(item.amount) || 0;
            if (item.type === "Savings") {
                totalCash += amt;
                if (members.hasOwnProperty(item.member)) members[item.member] += amt;
            } else {
                totalCash -= amt;
            }
        });

        // Update Cash Display
        document.getElementById('cashAtHand').innerText = totalCash.toLocaleString();

        // Update Progress Bars
        const progSection = document.getElementById('progressSection');
        progSection.innerHTML = "";
        for (let name in members) {
            let pct = Math.min((members[name] / 50000) * 100, 100);
            progSection.innerHTML += `
                <div class="progress-container">
                    <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;">
                        <span>${name}</span>
                        <span>${members[name].toLocaleString()} / 50k</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${pct}%"></div>
                    </div>
                </div>`;
        }
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        statusDiv.innerText = "Sending data to Google...";
        document.getElementById('submitBtn').disabled = true;

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(() => {
                statusDiv.innerText = "✅ Saved Successfully!";
                form.reset();
                monthInput.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                fetchData(); // Refresh totals after saving
            })
            .catch(error => {
                statusDiv.innerText = "❌ Error: " + error.message;
            })
            .finally(() => {
                document.getElementById('submitBtn').disabled = false;
            });
    });
</script>

</body>
</html>
