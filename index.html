<!DOCTYPE html>
<html>
<head>
    <title>The Optician Savings Tracker</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div class="card">
    <h2>Group Savings Tracker</h2>
    <form id="savingsForm">
        <select name="member" required>
            <option value="">Select Member</option>
            <option value="Nathan">Nathan</option>
            <option value="Brian">Brian</option>
            <option value="Jackson">Jackson</option>
        </select>
        
        <select name="type" required>
            <option value="Savings">Savings</option>
            <option value="Borrowed">Borrowed</option>
            <option value="Expense">Expense</option>
        </select>

        <input type="number" name="amount" placeholder="Amount (UGX)" required>
        <input type="month" name="month" required>
        
        <button type="submit" id="submitBtn">Save Entry</button>
    </form>
    <p id="status" style="text-align:center; color: blue;"></p>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw4mzA7tnnaBiXfKoDwnWAEooCPfJDLanuxZax5xLE29-rx9npE4T9bGi1ZB8pFvW1smw/exec'; // <--- PASTE YOUR GOOGLE URL HERE
    const form = document.getElementById('savingsForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', e => {
        e.preventDefault();
        status.innerText = "Sending data...";
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                status.innerText = "✅ Successfully saved to Google Sheets!";
                form.reset();
            })
            .catch(error => {
                status.innerText = "❌ Error: " + error.message;
            });
    });
</script>

</body>
</html>
