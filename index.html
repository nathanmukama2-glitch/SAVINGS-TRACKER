<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Savings: Brian, Jackson & Nathan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 450px; margin: 20px auto; padding: 20px; background-color: #f8f9fa; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: center; border-top: 5px solid #27ae60; }
        .progress-box { background: #e9ecef; border-radius: 20px; height: 20px; margin: 15px 0; overflow: hidden; }
        #bar { background: #27ae60; height: 100%; width: 0%; transition: 0.5s; }
        select, input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .btn-add { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .history { margin-top: 20px; text-align: left; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #eee; max-height: 200px; overflow-y: auto; }
        .month-label { font-weight: bold; color: #495057; display: block; margin-bottom: 5px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h2>Monthly Target: 50,000 UGX</h2>
    
    <label class="month-label">Saving for Month:</label>
    <select id="monthSelect">
        <option value="March">March 2026</option>
        <option value="April">April 2026</option>
        <option value="May">May 2026</option>
        <option value="June">June 2026</option>
    </select>

    <div class="progress-box">
        <div id="bar"></div>
    </div>
    <h3 id="total-display">Total: 0 / 50,000 UGX</h3>

    <select id="userSelect">
        <option value="Brian">Brian</option>
        <option value="Jackson">Jackson</option>
        <option value="Nathan">Nathan</option>
    </select>
    
    <input type="number" id="amountInput" placeholder="Enter Amount (e.g. 5000)">
    <button class="btn-add" onclick="saveMoney()">Add Contribution</button>

    <div class="history">
        <strong>Savings History:</strong>
        <ul id="activityList" style="list-style: none; padding: 0; font-size: 14px;"></ul>
    </div>
</div>

<script>
    let totalSaved = 0;
    const monthlyGoal = 50000;

    function saveMoney() {
        const user = document.getElementById('userSelect').value;
        const month = document.getElementById('monthSelect').value;
        const amount = parseInt(document.getElementById('amountInput').value);

        if (amount > 0) {
            totalSaved += amount;
            
            // Update the Bar and Text
            const percent = Math.min((totalSaved / monthlyGoal) * 100, 100);
            document.getElementById('bar').style.width = percent + '%';
            document.getElementById('total-display').innerText = `Total: ${totalSaved.toLocaleString()} / 50,000 UGX`;

            // Add to History with Month
            const list = document.getElementById('activityList');
            const item = document.createElement('li');
            item.style.padding = "5px 0";
            item.style.borderBottom = "1px solid #f1f1f1";
            item.innerHTML = `📅 <b>${month}</b>: ${user} added ${amount.toLocaleString()} UGX`;
            list.prepend(item);

            // Clear input
            document.getElementById('amountInput').value = '';
            
            // Check if goal met
            if (totalSaved >= monthlyGoal) {
                alert(`Congratulations! You have reached the 50,000 UGX goal for ${month}! 🎉`);
            }
        } else {
            alert("Please enter a valid amount.");
        }
    }
</script>

</body>
</html>
