<!DOCTYPE html>
<html>
<head>
    <title>The Optician Savings Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div class="card">
    <h2>Group Savings Tracker</h2>
    <form id="savingsForm">
        <select name="member" required>
            <option value="">Select Member</option>
            <option value="Nathan">Nathan</option>
            <option value="Brian">Brian</option>
            <option value="Jackson">Jackson</option>
        </select>
        
        <select name="type" required>
            <option value="Savings">Savings</option>
            <option value="Borrowed">Borrowed</option>
            <option value="Expense">Expense</option>
        </select>

        <input type="number" name="amount" placeholder="Amount (UGX)" required>
        <input type="month" name="month" required>
        
        <button type="submit" id="submitBtn">Save Entry</button>
    </form>
    <hr>
    <h3>Financial Summary</h3>
    <div style="background: #e9ecef; padding: 10px; border-radius: 5px; margin-bottom: 10px;">
        <strong>Cash at Hand: </strong><span id="cashAtHand">0</span> UGX
    </div>

    <h4>Member Progress (50k Target)</h4>
    <div id="progressSection">
        </div>

    <h4>Recent Activity</h4>
    <ul id="activityLog" style="font-size: 0.85em; color: #555;">
        <li>No entries yet.</li>
    </ul>
    <p id="status" style="text-align:center; color: blue;"></p>
</div>

<script>
  // 1. DELETE ANY OTHER SCRIPTURL LINES EXCEPT THIS ONE:
const scriptURL = 'https://script.google.com/macros/s/AKfycbwBNGailOBgOdJESud79IMKVEWzpymet8xh3D_QTTNWV2eVJjSMPqIgmpvoe5PX6MjexQ/exec'; 

const form = document.getElementById('savingsForm');


    // Tracking variables
    let totalCash = 0;
    const memberTotals = { Nathan: 0, Brian: 0, Jackson: 0 };

    form.addEventListener('submit', e => {
        e.preventDefault();
        const formData = new FormData(form);
        const name = formData.get('member');
        const type = formData.get('type');
        const amount = parseFloat(formData.get('amount'));

        fetch(scriptURL, { method: 'POST', body: formData})
            .then(response => {
                alert("Data Sent to Google Sheets!");
                updateLocalDashboard(name, type, amount);
                form.reset();
            })
            .catch(error => console.error('Error!', error.message));
    });

    function updateLocalDashboard(name, type, amount) {
        // Update Cash Logic
        if (type === "Savings") {
            totalCash += amount;
            memberTotals[name] += amount;
        } else {
            totalCash -= amount; // Deduct for Expenses or Borrowing
        }

        // Update Text
        document.getElementById('cashAtHand').innerText = totalCash.toLocaleString();

        // Update Activity Log
        const log = document.getElementById('activityLog');
        if (log.innerText.includes("No entries")) log.innerHTML = "";
        const entry = document.createElement('li');
        entry.innerText = `${name} added ${amount.toLocaleString()} (${type})`;
        log.prepend(entry);
        
        // Function to load data from Google Sheets when the page opens
function loadDataFromSheet() {
    fetch(scriptURL)
        .then(response => response.json())
        .then(data => {
            // Reset totals before calculating
            totalCash = 0;
            memberTotals = { Nathan: 0, Brian: 0, Jackson: 0 };
            
            data.forEach(entry => {
                const amt = parseFloat(entry.amount);
                if (entry.type === "Savings") {
                    totalCash += amt;
                    memberTotals[entry.member] += amt;
                } else {
                    totalCash -= amt;
                }
            });
            
            // Refresh the screen with real data from the sheet
            renderDashboard(); 
        });
}

// Run this automatically when the page loads
window.onload = loadDataFromSheet;

        // Update Progress Bar
        const progSection = document.getElementById('progressSection');
        progSection.innerHTML = ""; // Clear and redraw
        for (let member in memberTotals) {
            let pct = (memberTotals[member] / 50000) * 100;
            progSection.innerHTML += `
                <div style="margin-bottom:5px;">
                    <small>${member}: ${memberTotals[member].toLocaleString()} / 50,000</small>
                    <div style="background:#ddd; height:8px; border-radius:4px;">
                        <div style="background:#28a745; width:${Math.min(pct, 100)}%; height:100%; border-radius:4px;"></div>
                    </div>
                </div>`;
        }
    }
</script>

</body>
</html>
