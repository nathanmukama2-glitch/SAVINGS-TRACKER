<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian, Jackson & Nathan - Monthly Savings</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 450px; margin: 20px auto; padding: 20px; background-color: #f8f9fa; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid #27ae60; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-add { width: 100%; padding: 14px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add:disabled { background: #ccc; }
        #status { margin-top: 15px; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>

<div class="card">
    <h2>Target: 50,000 UGX</h2>
    <p>Monthly Savings Tracker</p>
    
    <form id="savingsForm">
        <label>Select Month:</label>
        <select name="Month" id="monthSelect">
            <option value="March">March 2026</option>
            <option value="April">April 2026</option>
            <option value="May">May 2026</option>
        </select>

        <label>Who is saving?</label>
        <select name="Member" id="userSelect">
            <option value="Brian">Brian</option>
            <option value="Jackson">Jackson</option>
            <option value="Nathan">Nathan</option>
        </select>
        
        <input type="number" name="Amount" id="amountInput" placeholder="Enter Amount (e.g. 5000)" required>
        
        <button type="submit" class="btn-add" id="submitBtn">Save to Google Sheets</button>
    </form>

    <div id="status"></div>
</div>

<script>
    // ************************************************************
    // PASTE YOUR GOOGLE URL BETWEEN THE QUOTES BELOW:
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxhN3L9KW3vFMsEzcAsuu7alI20FBNCAzH2OuR6jLsei1_3YgeT4batHo7qtGnUq2vA/execE'; 
    // ************************************************************

    const form = document.getElementById('savingsForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Sending Data...";
        status.innerText = "Please wait...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("Success! Your savings have been recorded.");
                status.innerText = "Saved Successfully!";
                form.reset();
                btn.disabled = false;
                btn.innerText = "Save to Google Sheets";
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("Error! Check your URL or Internet connection.");
                btn.disabled = false;
                btn.innerText = "Try Again";
            });
    });
</script>

</body>
</html>
