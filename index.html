<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Savings Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>💰 Monthly Savings Tracker</h2>
        <p>Goal: 50,000 UGX per person</p>
        
        <div class="input-group">
            <select id="userName">
                <option value="Nathan">Nathan</option>
                <option value="Brian">Brian</option>
                <option value="Jackson">Jackson</option>
            </select>
            <input type="number" id="amount" placeholder="Enter Amount (UGX)">
            <button onclick="addSaving()">Add Payment</button>
        </div>

        <div id="progress-container">
            </div>
<div id="total-savings-box" style="background: #28a745; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px;">
    <h2 style="margin: 0;">Total Group Savings</h2>
    <p id="grand-total" style="font-size: 24px; font-weight: bold; margin: 5px 0 0 0;">0 UGX</p>
</div>
        <button class="reset-btn" onclick="resetData()">Reset Month</button>
<div id="history-section" style="margin-top: 30px; border-top: 1px solid #ddd; padding-top: 20px;">
    <h3>Recent Payments</h3>
    <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
        <thead>
            <tr style="background-color: #f2f2f2; text-align: left;">
                <th style="padding: 8px; border-bottom: 1px solid #ddd;">Name</th>
                <th style="padding: 8px; border-bottom: 1px solid #ddd;">Amount</th>
                <th style="padding: 8px; border-bottom: 1px solid #ddd;">Date</th>
            </tr>
        </thead>
        <tbody id="payment-history">
            </tbody>
    </table>
</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
